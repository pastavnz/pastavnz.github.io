<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farebox — Live Transit Occupancy</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg-deep:#0A101C;
    --bg-panel:#111A2B;
    --bg-raised:#182640;
    --line:#243350;
    --text-hi:#E9EEF7;
    --text-mid:#9AA9C4;
    --text-dim:#5C6C8A;
    --amber:#F2A93B;
    --teal:#2DD4BF;
    --rose:#FB7185;
    --violet:#A78BFA;
    --ok:#34D399;
    --warn:#FBBF24;
    --bad:#F87171;
    --disp:'Space Grotesk', sans-serif;
    --body:'Inter', sans-serif;
    --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%; background:var(--bg-deep); color:var(--text-hi);
    font-family:var(--body); overflow:hidden;
  }
  #app{ display:flex; flex-direction:column; height:100%; }

  /* ---------- TOP BAR ---------- */
  #topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px; background:var(--bg-panel); border-bottom:1px solid var(--line);
    z-index:1200; position:relative;
  }
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .brand .mark{
    font-family:var(--disp); font-weight:700; font-size:20px; letter-spacing:0.5px;
    color:var(--text-hi);
  }
  .brand .mark span{ color:var(--amber); }
  .brand .tag{ font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; }
  #clock{ font-family:var(--mono); font-size:13px; color:var(--text-mid); display:flex; align-items:center; gap:8px; }
  #clock .dot{ width:7px; height:7px; border-radius:50%; background:var(--ok); box-shadow:0 0 0 0 rgba(52,211,153,.6); animation:pulse 2s infinite; }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(52,211,153,.5); }
    70%{ box-shadow:0 0 0 7px rgba(52,211,153,0); }
    100%{ box-shadow:0 0 0 0 rgba(52,211,153,0); }
  }

  /* ---------- LAYOUT ---------- */
  #body{ flex:1; display:flex; min-height:0; position:relative; }

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:308px; min-width:308px; background:var(--bg-panel); border-right:1px solid var(--line);
    display:flex; flex-direction:column; z-index:1100;
  }
  #searchwrap{ padding:14px 14px 10px; border-bottom:1px solid var(--line); }
  #search{
    width:100%; background:var(--bg-raised); border:1px solid var(--line); border-radius:8px;
    color:var(--text-hi); padding:9px 11px; font-family:var(--body); font-size:13px; outline:none;
  }
  #search::placeholder{ color:var(--text-dim); }
  #search:focus{ border-color:var(--amber); }

  #routelist{ flex:1; overflow-y:auto; padding:6px 0; }
  .route-group{ border-bottom:1px solid var(--line); }
  .route-head{
    display:flex; align-items:center; gap:10px; padding:11px 14px; cursor:pointer;
    user-select:none;
  }
  .route-head:hover{ background:var(--bg-raised); }
  .route-chip{
    width:8px; height:26px; border-radius:3px; flex-shrink:0;
  }
  .route-info{ flex:1; min-width:0; }
  .route-name{ font-family:var(--disp); font-weight:600; font-size:14px; }
  .route-sub{ font-family:var(--mono); font-size:10.5px; color:var(--text-dim); margin-top:1px; }
  .route-caret{ color:var(--text-dim); font-size:11px; transition:transform .15s; }
  .route-group.open .route-caret{ transform:rotate(90deg); }

  .vehicle-list{ display:none; padding:0 10px 8px 30px; }
  .route-group.open .vehicle-list{ display:block; }
  .veh-row{
    display:flex; align-items:center; gap:9px; padding:7px 8px; border-radius:7px; cursor:pointer;
    margin-bottom:3px;
  }
  .veh-row:hover, .veh-row.active{ background:var(--bg-raised); }
  .veh-id{ font-family:var(--mono); font-size:11.5px; color:var(--text-mid); width:44px; flex-shrink:0; }
  .live-tag{
    font-family:var(--mono); font-size:9px; letter-spacing:0.5px; padding:1px 5px; border-radius:3px;
    background:rgba(52,211,153,0.14); color:var(--ok); flex-shrink:0;
  }
  .sim-tag{
    font-family:var(--mono); font-size:9px; letter-spacing:0.5px; padding:1px 5px; border-radius:3px;
    background:rgba(92,108,138,0.18); color:var(--text-dim); flex-shrink:0;
  }
  .occ-track{ flex:1; height:6px; background:var(--line); border-radius:4px; overflow:hidden; }
  .occ-fill{ height:100%; border-radius:4px; transition:width .6s ease, background-color .6s ease; }
  .occ-pct{ font-family:var(--mono); font-size:11px; width:32px; text-align:right; color:var(--text-mid); }

  #legend{
    padding:12px 14px 14px; border-top:1px solid var(--line); font-family:var(--mono); font-size:10.5px; color:var(--text-dim);
  }
  #legend .lg-title{ text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; color:var(--text-mid); }
  .lg-row{ display:flex; align-items:center; gap:7px; margin-bottom:5px; }
  .lg-swatch{ width:10px; height:10px; border-radius:2px; }

  /* ---------- MAP ---------- */
  #map{ flex:1; height:100%; background:#EAEDE8; }
  .leaflet-container{ font-family:var(--body); }
  .leaflet-control-attribution{
    background:rgba(17,26,43,0.75) !important; color:var(--text-dim) !important;
    font-family:var(--mono); font-size:10px !important;
  }
  .leaflet-control-attribution a{ color:var(--text-mid) !important; }

  .veh-marker{
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    position:relative; cursor:pointer;
  }
  .veh-marker .ring{
    position:absolute; inset:0; border-radius:50%;
  }
  .veh-marker .core{
    width:20px; height:20px; border-radius:50%; background:var(--bg-panel);
    display:flex; align-items:center; justify-content:center; z-index:2;
    border:2px solid var(--bg-deep);
  }
  .veh-marker .core svg{ width:11px; height:11px; }
  .veh-marker.selected .core{ box-shadow:0 0 0 3px rgba(242,169,59,.55); }
  .veh-marker .live-dot{
    position:absolute; top:-2px; right:-2px; width:8px; height:8px; border-radius:50%;
    background:var(--ok); border:2px solid var(--bg-deep); z-index:3;
  }

  /* ---------- DETAIL PANEL ---------- */
  #detail{
    position:absolute; top:0; right:-360px; width:340px; height:100%;
    background:var(--bg-panel); border-left:1px solid var(--line);
    transition:right .28s cubic-bezier(.4,0,.2,1); z-index:1300;
    display:flex; flex-direction:column; padding:18px;
    overflow-y:auto;
  }
  #detail.open{ right:0; }
  #detail .close-btn{
    align-self:flex-end; background:none; border:none; color:var(--text-dim);
    font-size:20px; cursor:pointer; line-height:1; padding:2px 6px;
  }
  #detail .close-btn:hover{ color:var(--text-hi); }
  #detail h2{ font-family:var(--disp); font-size:19px; margin:2px 0 2px; }
  #detail .veh-sub{ font-family:var(--mono); font-size:11.5px; color:var(--text-dim); margin-bottom:18px; }

  .gauge-wrap{ display:flex; align-items:center; gap:16px; margin-bottom:18px; }
  .gauge-num{ font-family:var(--disp); font-weight:700; font-size:30px; }
  .gauge-label{ font-family:var(--mono); font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }

  .car-diagram{
    display:grid; grid-template-columns:repeat(8, 1fr); gap:4px; margin-bottom:20px;
  }
  .seat{ aspect-ratio:1; border-radius:3px; background:var(--line); }
  .seat.filled{ background:var(--amber); }

  .stop-list{ list-style:none; margin:0; padding:0; }
  .stop-item{
    display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);
  }
  .stop-item:last-child{ border-bottom:none; }
  .stop-dot{ width:8px; height:8px; border-radius:50%; background:var(--text-dim); flex-shrink:0; }
  .stop-item.next .stop-dot{ background:var(--amber); }
  .stop-name{ flex:1; font-size:13px; }
  .stop-eta{ font-family:var(--mono); font-size:12px; color:var(--text-mid); }

  .detail-section-label{
    font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:1px;
    color:var(--text-dim); margin:4px 0 10px;
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }

  @media (max-width:760px){
    #sidebar{ position:absolute; left:0; top:0; height:100%; width:280px; min-width:280px;
      transform:translateX(-100%); transition:transform .25s; }
    #sidebar.open{ transform:translateX(0); }
    #detail{ width:calc(100% - 24px); right:-100%; }
    #menuBtn{ display:flex !important; }
  }
  #menuBtn{
    display:none; align-items:center; justify-content:center; width:32px; height:32px;
    background:var(--bg-raised); border:1px solid var(--line); border-radius:7px; color:var(--text-hi);
    cursor:pointer; margin-right:10px; font-size:16px;
  }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div style="display:flex; align-items:center;">
      <button id="menuBtn">☰</button>
      <div class="brand">
        <div class="mark">FARE<span>BOX</span></div>
        <div class="tag">live occupancy transit</div>
      </div>
    </div>
    <div id="clock"><span class="dot"></span><span id="clockText">--:--:--</span></div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div id="searchwrap">
        <input id="search" type="text" placeholder="Search route or vehicle…" />
      </div>
      <div id="routelist"></div>
      <div id="legend">
        <div class="lg-title">Occupancy</div>
        <div class="lg-row"><div class="lg-swatch" style="background:var(--ok)"></div>Low · under 40%</div>
        <div class="lg-row"><div class="lg-swatch" style="background:var(--warn)"></div>Moderate · 40–75%</div>
        <div class="lg-row"><div class="lg-swatch" style="background:var(--bad)"></div>Crowded · over 75%</div>
      </div>
    </div>

    <div id="map"></div>

    <div id="detail">
      <button class="close-btn" id="closeDetail">✕</button>
      <div id="detailBody"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ============================================================
   FAREBOX — real-time transit occupancy tracker
   Sample route/stop data is a placeholder — swap ROUTES coordinates
   for a real GTFS feed or your city's actual paths to go live.
   ============================================================ */

/* ---------------------------------------------------------------
   FIREBASE SETUP — must be the SAME config object as driver.html,
   since both pages need to point at the same project/database.
   Get this from: Firebase Console → Project Settings → General →
   "Your apps" → Web app → SDK setup and configuration.
--------------------------------------------------------------- */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ROUTES = [
  {
    id:'R1', name:'Route 1 · Riverside', color:'#F2A93B',
    stops:[
      {name:'Riverside Terminal', lat:14.6055, lng:121.0110},
      {name:'Market Cross',       lat:14.6090, lng:121.0165},
      {name:'City Hall',          lat:14.6135, lng:121.0210},
      {name:'North Plaza',        lat:14.6180, lng:121.0175},
      {name:'University Gate',    lat:14.6150, lng:121.0100},
      {name:'Riverside Terminal', lat:14.6055, lng:121.0110},
    ],
    vehicles:[ {id:'1042', cap:60, occ:22, offset:0.00}, {id:'1047', cap:60, occ:51, offset:0.5} ]
  },
  {
    id:'R2', name:'Route 2 · Harborline', color:'#2DD4BF',
    stops:[
      {name:'Harbor Depot',      lat:14.5985, lng:121.0230},
      {name:'Fish Market',       lat:14.6010, lng:121.0290},
      {name:'East Terminal',     lat:14.6070, lng:121.0320},
      {name:'Grand Station',     lat:14.6120, lng:121.0270},
      {name:'Old Bridge',        lat:14.6050, lng:121.0225},
      {name:'Harbor Depot',      lat:14.5985, lng:121.0230},
    ],
    vehicles:[ {id:'2011', cap:45, occ:39, offset:0.15}, {id:'2016', cap:45, occ:8, offset:0.65} ]
  },
  {
    id:'R3', name:'Route 3 · Highline Loop', color:'#FB7185',
    stops:[
      {name:'Highline North',    lat:14.6225, lng:121.0055},
      {name:'Garden District',   lat:14.6205, lng:121.0000},
      {name:'West Commons',      lat:14.6150, lng:120.9960},
      {name:'Lower Yard',        lat:14.6100, lng:121.0015},
      {name:'Highline South',    lat:14.6165, lng:121.0075},
      {name:'Highline North',    lat:14.6225, lng:121.0055},
    ],
    vehicles:[ {id:'3003', cap:70, occ:63, offset:0.30}, {id:'3008', cap:70, occ:70, offset:0.80} ]
  },
  {
    id:'R4', name:'Route 4 · Airport Express', color:'#A78BFA',
    stops:[
      {name:'Central Interchange', lat:14.6040, lng:121.0140},
      {name:'Trade Center',        lat:14.5960, lng:121.0180},
      {name:'Freight Yard',        lat:14.5900, lng:121.0130},
      {name:'Airport Terminal',    lat:14.5875, lng:121.0060},
      {name:'South Gate',          lat:14.5975, lng:121.0075},
      {name:'Central Interchange', lat:14.6040, lng:121.0140},
    ],
    vehicles:[ {id:'4020', cap:80, occ:12, offset:0.45} ]
  }
];

function occLevel(pct){
  if(pct < 40) return {c:'var(--ok)', label:'Low'};
  if(pct <= 75) return {c:'var(--warn)', label:'Moderate'};
  return {c:'var(--bad)', label:'Crowded'};
}
function occPct(v){ return Math.round((v.occ / v.cap) * 100); }

/* ---------- build per-vehicle path length trackers ---------- */
function nearestSegment(stops, lat, lng){
  if(lat == null || lng == null) return 0;
  let best = 0, bestDist = Infinity;
  for(let i=0; i<stops.length-1; i++){
    const dx = stops[i].lat - lat, dy = stops[i].lng - lng;
    const d = dx*dx + dy*dy;
    if(d < bestDist){ bestDist = d; best = i; }
  }
  return best;
}

const map = L.map('map', { zoomControl:false, attributionControl:true }).setView([14.605, 121.013], 13.6);
L.control.zoom({ position:'bottomright' }).addTo(map);

/* ---------------------------------------------------------------
   Real street basemap via OpenStreetMap's free public tile server.
   No API key, no billing account — just a straight tile fetch.
   (Google Maps tiles require a Google Cloud API key + billing, so
   this is the true no-cost option. If you later want Google's
   imagery instead, swap this L.tileLayer's url/attribution for
   Google's Maps JavaScript API once you have a key.)
--------------------------------------------------------------- */
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

const vehicleMarkers = {}; // id -> {marker, route, data, t}
const routeGroupState = {};

function busIconSVG(color){
  return `<svg viewBox="0 0 24 24" fill="none"><path d="M4 16V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v9" stroke="${color}" stroke-width="1.6"/><rect x="4" y="7" width="16" height="9" rx="1.4" fill="${color}" fill-opacity=".18" stroke="${color}" stroke-width="1.6"/><circle cx="8" cy="18" r="1.6" fill="${color}"/><circle cx="16" cy="18" r="1.6" fill="${color}"/></svg>`;
}

function makeVehicleIcon(route, vdata, pct, isLive){
  const lvl = occLevel(pct);
  const ring = `conic-gradient(${lvl.c} ${pct}%, rgba(255,255,255,0.08) ${pct}% 100%)`;
  const html = `
    <div class="veh-marker" data-id="${vdata.id}">
      <div class="ring" style="background:${ring}"></div>
      <div class="core">${busIconSVG(route.color)}</div>
      ${isLive ? '<div class="live-dot" title="Live GPS"></div>' : ''}
    </div>`;
  return L.divIcon({ html, className:'', iconSize:[30,30], iconAnchor:[15,15] });
}

let selectedVehicleId = null;

ROUTES.forEach(route=>{
  // draw path
  const latlngs = route.stops.map(s=>[s.lat, s.lng]);
  L.polyline(latlngs, { color:route.color, weight:4, opacity:0.85, dashArray:'1 8', lineCap:'round' }).addTo(map);
  route.stops.forEach((s,i)=>{
    if(i === route.stops.length-1) return; // last dup of first
    L.circleMarker([s.lat,s.lng], {
      radius:4, color:route.color, weight:2, fillColor:'#FFFFFF', fillOpacity:1
    }).addTo(map);
  });

  route.vehicles.forEach(vdata=>{
    vdata.isLive = false;
  }); // markers are created in tick() only once a driver actually broadcasts
});

/* ---------- sidebar build ---------- */
const routelist = document.getElementById('routelist');
function renderSidebar(filter=''){
  routelist.innerHTML = '';
  const f = filter.trim().toLowerCase();
  let anyLive = false;
  ROUTES.forEach(route=>{
    const liveVehicles = route.vehicles.filter(v => vehicleMarkers[v.id]);
    if(liveVehicles.length === 0) return; // no driver broadcasting for this route — hide it entirely

    const matchesRoute = route.name.toLowerCase().includes(f);
    const visibleVehicles = liveVehicles.filter(v => matchesRoute || v.id.includes(f));
    if(f && !matchesRoute && visibleVehicles.length===0) return;
    anyLive = true;

    const group = document.createElement('div');
    group.className = 'route-group' + (routeGroupState[route.id] ? ' open' : '');
    group.innerHTML = `
      <div class="route-head" data-route="${route.id}">
        <div class="route-chip" style="background:${route.color}"></div>
        <div class="route-info">
          <div class="route-name">${route.name}</div>
          <div class="route-sub">${liveVehicles.length} vehicle${liveVehicles.length===1?'':'s'} live</div>
        </div>
        <div class="route-caret">▶</div>
      </div>
      <div class="vehicle-list"></div>
    `;
    const vlist = group.querySelector('.vehicle-list');
    (f ? visibleVehicles : liveVehicles).forEach(v=>{
      const pct = occPct(v);
      const lvl = occLevel(pct);
      const row = document.createElement('div');
      row.className = 'veh-row' + (v.id===selectedVehicleId ? ' active' : '');
      row.dataset.veh = v.id; row.dataset.route = route.id;
      row.innerHTML = `
        <div class="veh-id">#${v.id}</div>
        <span class="live-tag">LIVE</span>
        <div class="occ-track"><div class="occ-fill" style="width:${pct}%; background:${lvl.c}"></div></div>
        <div class="occ-pct">${pct}%</div>
      `;
      row.addEventListener('click', ()=> selectVehicle(route.id, v.id));
      vlist.appendChild(row);
    });
    group.querySelector('.route-head').addEventListener('click', ()=>{
      routeGroupState[route.id] = !routeGroupState[route.id];
      renderSidebar(document.getElementById('search').value);
    });
    routelist.appendChild(group);
  });
  if(!anyLive){
    routelist.innerHTML = `
      <div style="padding:24px 16px; text-align:center; font-family:var(--mono); font-size:12px; color:var(--text-dim); line-height:1.6;">
        No vehicles are currently live.<br>Open the driver console and tap "Go live" to broadcast a route.
      </div>`;
  }
}
ROUTES.forEach(r => routeGroupState[r.id] = true);
renderSidebar();

document.getElementById('search').addEventListener('input', e=> renderSidebar(e.target.value));

/* ---------- detail panel ---------- */
const detailPanel = document.getElementById('detail');
const detailBody = document.getElementById('detailBody');

function selectVehicle(routeId, vehId){
  selectedVehicleId = vehId;
  const entry = vehicleMarkers[vehId];
  Object.values(vehicleMarkers).forEach(({marker})=>{
    const el = marker.getElement();
    if(el){ el.querySelector('.veh-marker')?.classList.remove('selected'); }
  });
  const el = entry.marker.getElement();
  if(el) el.querySelector('.veh-marker')?.classList.add('selected');

  renderDetail(entry.route, entry.data);
  detailPanel.classList.add('open');
  renderSidebar(document.getElementById('search').value);
  map.panTo(entry.marker.getLatLng(), { animate:true });
}

function renderDetail(route, vdata){
  const pct = occPct(vdata);
  const lvl = occLevel(pct);
  const seatCount = 32;
  const filledSeats = Math.round((pct/100) * seatCount);
  let seatsHTML = '';
  for(let i=0;i<seatCount;i++){
    seatsHTML += `<div class="seat${i<filledSeats?' filled':''}"></div>`;
  }

  const segIdx = nearestSegment(route.stops, vdata.lat, vdata.lng);
  const upcoming = [];
  for(let i=1;i<=3;i++){
    const idx = (segIdx + i) % (route.stops.length - 1);
    const stop = route.stops[idx+1] || route.stops[1];
    upcoming.push({ name: route.stops[(segIdx+i) % (route.stops.length-1) + 1].name, eta: i*3 + Math.floor(Math.random()*2) });
  }

  detailBody.innerHTML = `
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:2px;">
      <div class="route-chip" style="background:${route.color}; height:18px;"></div>
      <div style="font-family:var(--mono); font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">${route.name}</div>
    </div>
    <h2>Vehicle #${vdata.id}</h2>
    <div class="veh-sub">Capacity ${vdata.cap} · ${vdata.isLive ? 'Live GPS from driver device' : 'Demo data — no driver connected yet'}</div>

    <div class="gauge-wrap">
      <div class="gauge-num" style="color:${lvl.c}">${pct}%</div>
      <div>
        <div class="gauge-label">Occupancy</div>
        <div style="font-family:var(--disp); font-size:14px; color:${lvl.c}; font-weight:600;">${lvl.label}</div>
        <div style="font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:2px;">${vdata.occ} of ${vdata.cap} seats/spaces</div>
      </div>
    </div>

    <div class="detail-section-label">Cabin view</div>
    <div class="car-diagram">${seatsHTML}</div>

    <div class="detail-section-label">Upcoming stops</div>
    <ul class="stop-list">
      ${upcoming.map((s,i)=>`
        <li class="stop-item${i===0?' next':''}">
          <div class="stop-dot"></div>
          <div class="stop-name">${s.name}</div>
          <div class="stop-eta">${s.eta} min</div>
        </li>`).join('')}
    </ul>
  `;
}

document.getElementById('closeDetail').addEventListener('click', ()=>{
  detailPanel.classList.remove('open');
  selectedVehicleId = null;
  Object.values(vehicleMarkers).forEach(({marker})=>{
    const el = marker.getElement();
    if(el){ el.querySelector('.veh-marker')?.classList.remove('selected'); }
  });
  renderSidebar(document.getElementById('search').value);
});

/* ---------- mobile menu ---------- */
document.getElementById('menuBtn').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.toggle('open');
});

/* ---------- clock ---------- */
function tickClock(){
  const now = new Date();
  document.getElementById('clockText').textContent = now.toLocaleTimeString([], {hour12:false});
}
setInterval(tickClock, 1000); tickClock();

/* ---------- real-time data: read what drivers have broadcast ---------- */
// Drivers running driver.html write to shared storage key "vehicle:<id>".
// Passenger view polls that storage. A vehicle only appears on the map
// and in the sidebar while its driver console is open and broadcasting;
// as soon as it goes offline (or the data goes stale) it disappears.
const LIVE_STALE_MS = 20000; // treat data older than this as offline

async function fetchLiveVehicle(id){
  try{
    const snap = await db.ref('vehicles/' + id).once('value');
    if(!snap.exists()) return null;
    const parsed = snap.val();
    if(Date.now() - parsed.updatedAt > LIVE_STALE_MS) return null;
    return parsed;
  }catch(e){
    return null; // key not found or read error -> treat as no live data
  }
}

async function tick(){
  let selectedWentOffline = false;
  for(const route of ROUTES){
    for(const vdata of route.vehicles){
      const live = await fetchLiveVehicle(vdata.id);
      let entry = vehicleMarkers[vdata.id];

      if(live){
        vdata.isLive = true;
        vdata.occ = Math.round((live.occupancyPct/100) * vdata.cap);
        vdata.lat = live.lat; vdata.lng = live.lng;
        const pos = [live.lat, live.lng];
        const pct = occPct(vdata);

        if(!entry){
          const marker = L.marker(pos, { icon: makeVehicleIcon(route, vdata, pct, true) }).addTo(map);
          marker.on('click', ()=> selectVehicle(route.id, vdata.id));
          entry = vehicleMarkers[vdata.id] = { marker, route, data:vdata };
        } else {
          entry.marker.setLatLng(pos);
          entry.marker.setIcon(makeVehicleIcon(route, vdata, pct, true));
        }
        if(vdata.id === selectedVehicleId){
          const el = entry.marker.getElement();
          if(el) el.querySelector('.veh-marker')?.classList.add('selected');
        }
      } else if(entry){
        // driver just went offline — remove its marker entirely
        map.removeLayer(entry.marker);
        delete vehicleMarkers[vdata.id];
        vdata.isLive = false;
        if(vdata.id === selectedVehicleId) selectedWentOffline = true;
      }
    }
  }

  if(selectedWentOffline){
    selectedVehicleId = null;
    detailPanel.classList.remove('open');
  }

  renderSidebar(document.getElementById('search').value);
  if(selectedVehicleId && vehicleMarkers[selectedVehicleId]){
    const entry = vehicleMarkers[selectedVehicleId];
    renderDetail(entry.route, entry.data);
  }
}
setInterval(tick, 2500);
tick();
</script>
